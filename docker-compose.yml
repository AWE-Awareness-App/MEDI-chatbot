services:
  db:
    image: pgvector/pgvector:pg17
    container_name: medi_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: medi-docker
    ports:
      - "5432:5432"
    volumes:
      - medi_pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medi-docker"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: medi_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: medi_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - medi_audio_local:/app/.local_audio
      - ./piper_models:/app/.local_audio/piper_models

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: medi_worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    command:
      - /bin/sh
      - -c
      - |
          set -e
          if [ -z "$${PIPER_MODEL_PATH:-}" ]; then
            echo "PIPER_MODEL_PATH is not set"
            exit 1
          fi
          if [ ! -f "$${PIPER_MODEL_PATH}" ]; then
            voice_name="$${PIPER_MODEL_PATH##*/}"
            voice_name="$${voice_name%.onnx}"
            echo "Downloading Piper voice: $${voice_name}"
            python -m piper.download_voices "$${voice_name}" --download-dir /app/.local_audio/piper_models
          fi
          exec python -m app.worker_run
    volumes:
      - .:/app
      - medi_audio_local:/app/.local_audio
      - ./piper_models:/app/.local_audio/piper_models

volumes:
  medi_pgdata:
  medi_audio_local:
